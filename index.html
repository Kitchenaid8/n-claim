
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ulta Beauty $750 Gift Card</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',Tahoma,Verdana,sans-serif;
    background:#f3f4f6;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 16px;
  }
  .notif{
    background:#fff;
    border-radius:999px;
    padding:10px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
    font-size:14px;
    color:#333;
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-bottom:24px;
  }
  .notif .spark{color:#f59e0b;font-weight:bold}
  .notif .name{color:#f59e0b;font-weight:600}
  .notif .amount{color:#16a34a;font-weight:700}
  .card{
    background:#fff;
    border-radius:16px;
    padding:32px 28px;
    width:100%;
    max-width:380px;
    box-shadow:0 20px 50px -10px rgba(0,0,0,.15);
    text-align:center;
  }
  .logo{
    font-family:Georgia,serif;
    font-size:48px;
    font-weight:bold;
    color:#f59e0b;
    letter-spacing:2px;
    position:relative;
    display:inline-block;
    padding-bottom:6px;
  }
  .logo::after{
    content:"";
    position:absolute;
    left:-6px;right:-6px;bottom:0;
    height:14px;
    border-bottom:4px solid #f59e0b;
    border-radius:0 0 50% 50%/0 0 100% 100%;
  }
  .logo small{
    display:block;
    font-size:9px;
    letter-spacing:6px;
    color:#f59e0b;
    margin-top:2px;
    font-family:Arial,sans-serif;
    font-weight:normal;
  }
  .price{
    font-size:44px;
    font-weight:800;
    color:#f59e0b;
    margin-top:24px;
  }
  .subtitle{
    font-size:12px;
    letter-spacing:2px;
    color:#64748b;
    margin-top:4px;
  }
  .steps{
    background:#f1f5f9;
    border-radius:12px;
    padding:20px;
    margin-top:24px;
    text-align:left;
  }
  .step{
    display:flex;
    align-items:center;
    gap:12px;
    padding:8px 0;
  }
  .step-num{
    background:#f59e0b;
    color:#fff;
    width:28px;height:28px;
    border-radius:50%;
    display:flex;
    align-items:center;justify-content:center;
    font-size:13px;font-weight:700;
    flex-shrink:0;
  }
  .step-text{font-size:15px;font-weight:600;color:#1e293b}
  .cta{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    margin-top:24px;
    background:#f59e0b;
    color:#fff;
    border:none;
    padding:16px;
    font-size:15px;
    font-weight:700;
    letter-spacing:1px;
    border-radius:999px;
    cursor:pointer;
    transition:.2s;
    box-shadow:0 6px 20px rgba(245,158,11,.4);
  }
  .cta:hover{background:#ea8a06;transform:translateY(-1px)}
  @media (max-width:420px){
    .card{padding:24px 18px}
    .logo{font-size:40px}
    .price{font-size:36px}
    .notif{font-size:12px;padding:8px 14px}
  }
</style>
</head>
<body>
  <div class="notif">
    <span class="spark">✦</span>
    <span><span class="name">Jessica L.</span> claimed <span class="amount">$350!</span></span>
  </div>

  <div class="card">
    <div class="logo">ULTA<small>BEAUTY</small></div>
    <div class="price">$750</div>
    <div class="subtitle">ULTA BEAUTY GIFT CARD</div>

    <div class="steps">
      <div class="step"><div class="step-num">1</div><div class="step-text">Click The Button Below</div></div>
      <div class="step"><div class="step-num">2</div><div class="step-text">Enter Your Basic Info</div></div>
      <div class="step"><div class="step-num">3</div><div class="step-text">Complete 3-5 Deals</div></div>
      <div class="step"><div class="step-num">4</div><div class="step-text">Claim Your Reward</div></div>
    </div>

    <a href="https://trksy.org/aff_c?offer_id=1181&aff_id=3083" 
	<button class="cta">CLAIM YOUR GIFT CARD →</button>
	</a>
  </div>
</body>
</html>
